<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>忘记密码</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f7;
    --surface-warm: #fbfbfd;
    --fg: #1d1d1f;
    --fg-2: #424245;
    --muted: #6e6e73;
    --meta: #86868b;
    --border: #d2d2d7;
    --border-soft: #e8e8ed;
    --accent: #0071e3;
    --accent-on: #ffffff;
    --accent-hover: #0077ed;
    --accent-active: #0066cc;
    --error: #dc2626;
    --success: #16a34a;
    --font-display: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-body: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-pill: 980px;
    --motion-fast: 150ms;
    --motion-base: 220ms;
    --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-12: 48px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--surface);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-6);
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg);
    border-radius: var(--radius-lg);
    padding: 40px 36px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  }

  /* Steps indicator */
  .steps {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: var(--space-8);
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
    transition: background var(--motion-base) var(--ease-standard);
  }
  .step-dot.active { background: var(--accent); }
  .step-dot.done { background: var(--success); }

  .header { text-align: center; margin-bottom: var(--space-8); }
  .header h1 {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 600;
    color: var(--fg); letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 15px; color: var(--muted); line-height: 1.47;
  }

  .form { display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 13px; font-weight: 600; color: var(--fg);
  }

  .input-wrap input {
    width: 100%; height: 48px;
    padding: 0 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px; color: var(--fg);
    background: var(--bg);
    font-family: var(--font-body);
    transition: border-color var(--motion-fast) var(--ease-standard);
  }
  .input-wrap input:focus { outline: none; border-color: var(--accent); }
  .input-wrap input::placeholder { color: var(--meta); }

  .phone-row { display: flex; gap: 8px; }
  .country-pick {
    width: 92px; min-width: 92px; height: 48px;
    padding: 0 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px; color: var(--fg);
    background: var(--bg);
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    font-family: var(--font-body);
    transition: border-color var(--motion-fast) var(--ease-standard);
  }
  .country-pick:hover { border-color: var(--meta); }
  .phone-row input { flex: 1; }

  .code-row { display: flex; gap: 8px; }
  .code-row input {
    flex: 1; height: 48px;
    padding: 0 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px; color: var(--fg);
    background: var(--bg);
    font-family: var(--font-body);
    letter-spacing: 0.15em; text-align: center;
    transition: border-color var(--motion-fast) var(--ease-standard);
  }
  .code-row input:focus { outline: none; border-color: var(--accent); }
  .code-row input::placeholder { color: var(--meta); letter-spacing: 0; }

  .btn-send {
    min-width: 120px; height: 48px;
    padding: 0 14px;
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--accent);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    font-family: var(--font-body);
    white-space: nowrap;
    transition: all var(--motion-fast) var(--ease-standard);
  }
  .btn-send:hover { background: color-mix(in oklab, var(--accent), transparent 92%); }
  .btn-send:disabled { border-color: var(--border); color: var(--muted); cursor: not-allowed; background: transparent; }

  /* Password toggle */
  .input-pw {
    position: relative; display: flex; align-items: center;
  }
  .input-pw input {
    width: 100%; height: 48px;
    padding: 0 44px 0 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px; color: var(--fg);
    background: var(--bg);
    font-family: var(--font-body);
    transition: border-color var(--motion-fast) var(--ease-standard);
  }
  .input-pw input:focus { outline: none; border-color: var(--accent); }
  .input-pw input::placeholder { color: var(--meta); }
  .pw-toggle {
    position: absolute; right: 12px;
    width: 24px; height: 24px;
    background: none; border: none; cursor: pointer;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .pw-toggle:hover { color: var(--fg); }

  .btn-primary {
    width: 100%; height: 50px;
    background: var(--accent);
    color: var(--accent-on);
    border: none;
    border-radius: var(--radius-pill);
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: var(--font-body);
    transition: background-color var(--motion-fast) var(--ease-standard);
    margin-top: 2px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { background: var(--accent-active); }
  .btn-primary:disabled { background: #a1c6f0; cursor: not-allowed; }
  .btn-outline {
    width: 100%; height: 50px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-pill);
    font-size: 16px; font-weight: 500;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--font-body);
    transition: all var(--motion-fast) var(--ease-standard);
  }
  .btn-outline:hover { border-color: var(--meta); background: var(--surface); }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .field-msg { font-size: 12px; margin-top: 2px; display: none; }
  .field.has-error input,
  .field.has-error .country-pick { border-color: var(--error); }
  .field.has-error .field-msg.error { display: block; color: var(--error); }
  .field-msg.hint { display: block; color: var(--muted); }

  .step { display: none; }
  .step.active { display: block; }

  /* Success panel */
  .success-panel { text-align: center; padding: 16px 0; }
  .success-icon {
    width: 64px; height: 64px;
    background: color-mix(in oklab, var(--success), transparent 90%);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .success-icon svg { width: 32px; height: 32px; color: var(--success); }
  .success-panel h2 {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 600;
    color: var(--fg); margin-bottom: 8px;
  }
  .success-panel p {
    font-size: 15px; color: var(--muted); line-height: 1.47;
    margin-bottom: var(--space-6);
  }

  .back-link {
    display: block; text-align: center; margin-top: 20px;
    font-size: 14px;
  }
  .back-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .back-link a:hover { text-decoration: underline; }

  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: var(--fg); color: white;
    padding: 12px 24px; border-radius: var(--radius-pill);
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity var(--motion-base) var(--ease-standard);
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    body { padding: 16px; align-items: flex-start; padding-top: 60px; }
    .card { padding: 32px 24px; border-radius: var(--radius-md); box-shadow: none; }
    .header h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="card">
  <!-- Step dots -->
  <div class="steps">
    <span class="step-dot active" data-step="1"></span>
    <span class="step-dot" data-step="2"></span>
    <span class="step-dot" data-step="3"></span>
  </div>

  <div class="header">
    <h1>重置密码</h1>
    <p id="stepDesc">请输入注册时使用的手机号</p>
  </div>

  <form class="form" id="resetForm" autocomplete="off">
    <!-- Step 1: Phone -->
    <div class="step active" id="step1">
      <div class="field" id="phoneField">
        <label for="phone">手机号</label>
        <div class="phone-row">
          <button type="button" class="country-pick">
            <span>+86</span>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 4l3 3 3-3"/></svg>
          </button>
          <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" inputmode="numeric" autocomplete="tel" />
        </div>
        <span class="field-msg error" id="phoneError">请输入有效的手机号码</span>
      </div>
      <button type="button" class="btn-primary" id="toStep2">下一步</button>
    </div>

    <!-- Step 2: Code + Password -->
    <div class="step" id="step2">
      <div class="field" id="codeField">
        <label for="code">验证码</label>
        <div class="code-row">
          <input type="text" id="code" placeholder="输入 6 位验证码" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
          <button type="button" class="btn-send" id="sendBtn">发送验证码</button>
        </div>
        <span class="field-msg error" id="codeError">请输入 6 位验证码</span>
        <span class="field-msg hint" id="codeHint"></span>
      </div>

      <div class="field" id="pwField">
        <label for="password">新密码</label>
        <div class="input-pw">
          <input type="password" id="password" placeholder="至少 8 位，含字母和数字" minlength="8" autocomplete="new-password" />
          <button type="button" class="pw-toggle" id="pwToggle1" aria-label="显示密码">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-msg error" id="pwError">密码至少 8 位，需包含字母和数字</span>
      </div>

      <div class="field" id="confirmField">
        <label for="confirm">确认密码</label>
        <div class="input-pw">
          <input type="password" id="confirm" placeholder="再次输入新密码" minlength="8" autocomplete="new-password" />
          <button type="button" class="pw-toggle" id="pwToggle2" aria-label="显示密码">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-msg error" id="confirmError">两次输入的密码不一致</span>
      </div>

      <button type="button" class="btn-primary" id="toStep3">重置密码</button>
      <button type="button" class="btn-outline" id="backToStep1">返回上一步</button>
    </div>

    <!-- Step 3: Success -->
    <div class="step" id="step3">
      <div class="success-panel">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>密码重置成功</h2>
        <p>你的新密码已生效，现在可以使用新密码登录了。</p>
        <a href="login.html" class="btn-primary" style="display:inline-flex; text-decoration:none; width:auto; padding:0 32px;">返回登录</a>
      </div>
    </div>
  </form>

  <div class="back-link">
    <a href="login.html">← 返回登录</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  (function() {
    const toast = document.getElementById('toast');
    const stepDesc = document.getElementById('stepDesc');
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const dots = document.querySelectorAll('.step-dot');

    const phoneInput = document.getElementById('phone');
    const phoneField = document.getElementById('phoneField');
    const codeInput = document.getElementById('code');
    const codeField = document.getElementById('codeField');
    const codeHint = document.getElementById('codeHint');
    const sendBtn = document.getElementById('sendBtn');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');
    const pwField = document.getElementById('pwField');
    const confirmField = document.getElementById('confirmField');

    let countdown = 0, timer = null;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function setStep(n) {
      [step1, step2, step3].forEach((s, i) => s.classList.toggle('active', i + 1 === n));
      dots.forEach((d, i) => {
        d.classList.remove('active', 'done');
        if (i + 1 < n) d.classList.add('done');
        if (i + 1 === n) d.classList.add('active');
      });
      if (n === 1) stepDesc.textContent = '请输入注册时使用的手机号';
      if (n === 2) stepDesc.textContent = '验证身份并设置新密码';
      if (n === 3) stepDesc.textContent = '';
    }

    function validatePhone() {
      const raw = phoneInput.value.replace(/\s/g, '');
      const ok = /^1[3-9]\d{9}$/.test(raw);
      phoneField.classList.toggle('has-error', phoneInput.value.length > 0 && !ok);
      return ok;
    }

    function validateCode() {
      const ok = codeInput.value.length === 6 && /^\d{6}$/.test(codeInput.value);
      codeField.classList.toggle('has-error', codeInput.value.length > 0 && !ok);
      return ok;
    }

    function validatePassword() {
      const v = passwordInput.value;
      const ok = v.length >= 8 && /[a-zA-Z]/.test(v) && /\d/.test(v);
      pwField.classList.toggle('has-error', v.length > 0 && !ok);
      return ok;
    }

    function validateConfirm() {
      const ok = confirmInput.value === passwordInput.value && confirmInput.value.length > 0;
      confirmField.classList.toggle('has-error', confirmInput.value.length > 0 && !ok);
      return ok;
    }

    function startCountdown() {
      countdown = 60;
      sendBtn.disabled = true;
      sendBtn.textContent = countdown + 's 后重发';
      codeHint.textContent = '验证码已发送至 ' + phoneInput.value;
      timer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(timer);
          sendBtn.disabled = false;
          sendBtn.textContent = '重新发送';
          codeHint.textContent = '';
        } else {
          sendBtn.textContent = countdown + 's 后重发';
        }
      }, 1000);
    }

    phoneInput.addEventListener('input', validatePhone);
    codeInput.addEventListener('input', validateCode);
    passwordInput.addEventListener('input', () => { validatePassword(); validateConfirm(); });
    confirmInput.addEventListener('input', validateConfirm);

    // Step 1 → 2
    document.getElementById('toStep2').addEventListener('click', () => {
      if (!validatePhone()) { phoneField.classList.add('has-error'); return; }
      phoneField.classList.remove('has-error');
      showToast('验证码已发送');
      setStep(2);
      startCountdown();
      codeInput.focus();
    });

    // Back to step 1
    document.getElementById('backToStep1').addEventListener('click', () => {
      setStep(1);
      if (timer) { clearInterval(timer); sendBtn.disabled = false; sendBtn.textContent = '发送验证码'; codeHint.textContent = ''; }
    });

    // Send code (in step 2)
    sendBtn.addEventListener('click', () => {
      showToast('验证码已重新发送');
      startCountdown();
    });

    // Step 2 → 3
    document.getElementById('toStep3').addEventListener('click', () => {
      let valid = true;
      if (!validateCode()) { codeField.classList.add('has-error'); valid = false; }
      if (!validatePassword()) { pwField.classList.add('has-error'); valid = false; }
      if (!validateConfirm()) { confirmField.classList.add('has-error'); valid = false; }
      if (!valid) return;

      const btn = document.getElementById('toStep3');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span><span>重置中…</span>';

      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '重置密码';
        setStep(3);
      }, 1200);
    });

    // Password toggle
    function setupPwToggle(btnId, inputId) {
      const btn = document.getElementById(btnId);
      const input = document.getElementById(inputId);
      btn.addEventListener('click', () => {
        const isPw = input.type === 'password';
        input.type = isPw ? 'text' : 'password';
        btn.setAttribute('aria-label', isPw ? '隐藏密码' : '显示密码');
      });
    }
    setupPwToggle('pwToggle1', 'password');
    setupPwToggle('pwToggle2', 'confirm');
  })();
</script>
</body>
</html>
