<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇游戏</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #1a1a2e;
        font-family: "Arial", sans-serif;
        color: #e0e0e0;
      }

      .game-container {
        text-align: center;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 28px;
        color: #00ff88;
      }

      .score-board {
        font-size: 18px;
        margin-bottom: 15px;
        color: #0a0a0a;
        background: #00ff88;
        padding: 5px 20px;
        border-radius: 5px;
        display: inline-block;
      }

      canvas {
        border: 3px solid #00ff88;
        border-radius: 5px;
        background-color: #16213e;
        display: block;
        margin: 0 auto;
      }

      .info {
        margin-top: 15px;
        font-size: 14px;
        color: #888;
      }

      .overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
      }

      .game-over-text {
        font-size: 32px;
        color: #00ff88;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .restart-text {
        font-size: 16px;
        color: #eee;
      }

      .difficulty-selector {
        margin-bottom: 15px;
      }

      .difficulty-btn {
        padding: 6px 18px;
        margin: 0 5px;
        font-size: 14px;
        border: 2px solid #00ff88;
        border-radius: 5px;
        background: transparent;
        color: #eee;
        cursor: pointer;
        transition: all 0.2s;
      }

      .difficulty-btn:hover {
        background: #00ff88;
      }

      .difficulty-btn.active {
        background: #00ff88;
        font-weight: bold;
      }

      .game-wrapper {
        position: relative;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <h1>贪吃蛇</h1>
      <div class="difficulty-selector">
        <button
          class="difficulty-btn"
          data-speed="200"
          onclick="setDifficulty(this)"
        >
          简单
        </button>
        <button
          class="difficulty-btn active"
          data-speed="150"
          onclick="setDifficulty(this)"
        >
          中等
        </button>
        <button
          class="difficulty-btn"
          data-speed="80"
          onclick="setDifficulty(this)"
        >
          困难
        </button>
      </div>
      <div class="score-board">得分：<span id="score">0</span></div>
      <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="overlay" id="overlay" style="display: none">
          <div class="game-over-text">游戏结束</div>
          <div class="restart-text">按 空格键 重新开始</div>
        </div>
      </div>
      <div class="info">使用 方向键 控制移动方向</div>
    </div>

    <script>
      // ========== 游戏配置 ==========
      const GRID_SIZE = 20; // 每个格子的像素大小
      const GRID_COUNT = 20; // 格子数量（20x20）
      const CANVAS_SIZE = 400; // 画布像素大小
      let gameSpeed = 150; // 游戏帧间隔（毫秒），越小越快

      // ========== 获取 DOM 元素 ==========
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const overlayEl = document.getElementById("overlay");

      // ========== 游戏状态变量 ==========
      let snake = []; // 蛇身体坐标数组，每个元素 {x, y}
      let direction = "right"; // 当前移动方向
      let nextDirection = "right"; // 下一帧的移动方向（防止一帧内多次转向）
      let food = { x: 0, y: 0 }; // 食物坐标
      let score = 0; // 当前分数
      let gameRunning = false; // 游戏是否在运行
      let gameLoop = null; // 定时器ID

      // ========== 初始化游戏 ==========
      function initGame() {
        // 蛇初始位置在画布中央，长度为3
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 },
        ];
        direction = "right";
        nextDirection = "right";
        score = 0;
        scoreEl.textContent = score;
        overlayEl.style.display = "none";
        spawnFood();
      }

      // ========== 生成食物 ==========
      // 在随机位置生成食物，确保不在蛇身上
      function spawnFood() {
        let newFood;
        do {
          newFood = {
            x: Math.floor(Math.random() * GRID_COUNT),
            y: Math.floor(Math.random() * GRID_COUNT),
          };
        } while (
          snake.some(
            (segment) => segment.x === newFood.x && segment.y === newFood.y,
          )
        );
        food = newFood;
      }

      // ========== 游戏主循环 ==========
      function update() {
        // 更新方向（防止一帧内多次改变方向导致反向移动）
        direction = nextDirection;

        // 计算蛇头新位置
        const head = { ...snake[0] };
        switch (direction) {
          case "up":
            head.y--;
            break;
          case "down":
            head.y++;
            break;
          case "left":
            head.x--;
            break;
          case "right":
            head.x++;
            break;
        }

        // 检测撞墙
        if (
          head.x < 0 ||
          head.x >= GRID_COUNT ||
          head.y < 0 ||
          head.y >= GRID_COUNT
        ) {
          gameOver();
          return;
        }

        // 检测撞自己
        if (
          snake.some((segment) => segment.x === head.x && segment.y === head.y)
        ) {
          gameOver();
          return;
        }

        // 将新头部加入蛇身
        snake.unshift(head);

        // 检测是否吃到食物
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreEl.textContent = score;
          spawnFood();
        } else {
          // 没吃到食物，移除尾巴（保持长度不变）
          snake.pop();
        }

        draw();
      }

      // ========== 绘制画面 ==========
      function draw() {
        // 清空画布
        ctx.fillStyle = "#16213e";
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

        // 绘制蛇身
        snake.forEach((segment, index) => {
          if (index === 0) {
            // 蛇头用不同颜色
            ctx.fillStyle = "#00ff88";
          } else {
            // 蛇身渐变色
            ctx.fillStyle = "#00cc6a";
          }
          ctx.fillRect(
            segment.x * GRID_SIZE + 1,
            segment.y * GRID_SIZE + 1,
            GRID_SIZE - 2,
            GRID_SIZE - 2,
          );
        });

        // 绘制食物
        ctx.fillStyle = "#ffaa00";
        ctx.fillRect(
          food.x * GRID_SIZE + 1,
          food.y * GRID_SIZE + 1,
          GRID_SIZE - 2,
          GRID_SIZE - 2,
        );
      }

      // ========== 游戏结束 ==========
      function gameOver() {
        gameRunning = false;
        clearInterval(gameLoop);
        overlayEl.style.display = "block";
      }

      // ========== 开始游戏 ==========
      function startGame() {
        if (gameRunning) return;
        initGame();
        gameRunning = true;
        gameLoop = setInterval(update, gameSpeed);
      }

      // ========== 切换难度 ==========
      // 点击难度按钮时调用，更新速度并重新开始游戏
      function setDifficulty(btn) {
        // 更新按钮高亮状态
        document
          .querySelectorAll(".difficulty-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        // 更新速度
        gameSpeed = parseInt(btn.dataset.speed);
        // 如果游戏正在运行，先停止再重新开始
        if (gameRunning) {
          clearInterval(gameLoop);
          gameRunning = false;
        }
        startGame();
      }

      // ========== 键盘事件监听 ==========
      document.addEventListener("keydown", (e) => {
        // 空格键重新开始
        if (e.code === "Space") {
          e.preventDefault();
          if (!gameRunning) {
            startGame();
          }
          return;
        }

        // 方向键控制（防止反向移动）
        switch (e.code) {
          case "ArrowUp":
            e.preventDefault();
            if (direction !== "down") nextDirection = "up";
            break;
          case "ArrowDown":
            e.preventDefault();
            if (direction !== "up") nextDirection = "down";
            break;
          case "ArrowLeft":
            e.preventDefault();
            if (direction !== "right") nextDirection = "left";
            break;
          case "ArrowRight":
            e.preventDefault();
            if (direction !== "left") nextDirection = "right";
            break;
        }
      });

      // ========== 页面加载后自动开始游戏 ==========
      startGame();
    </script>
  </body>
</html>
