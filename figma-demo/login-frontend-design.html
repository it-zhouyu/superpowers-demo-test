<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #08080a;
      --card-bg: rgba(18, 18, 22, 0.85);
      --card-border: rgba(212, 165, 116, 0.12);
      --text-primary: #f5f0eb;
      --text-secondary: #8a8580;
      --text-muted: #5a5550;
      --accent: #d4a574;
      --accent-glow: rgba(212, 165, 116, 0.15);
      --input-bg: rgba(255, 255, 255, 0.04);
      --input-border: rgba(255, 255, 255, 0.08);
      --input-focus: rgba(212, 165, 116, 0.3);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui: 'Outfit', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font-ui);
      color: var(--text-primary);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- background layers --- */

    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(212, 165, 116, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 20%, rgba(180, 140, 100, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse 100% 100% at 50% 50%, rgba(20, 18, 15, 1) 0%, var(--bg) 70%);
      z-index: 0;
    }

    .bg-grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.025;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* decorative lines */

    .deco-line {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }

    .deco-line--vertical {
      width: 1px;
      height: 40vh;
      top: 0;
      left: 15%;
      background: linear-gradient(to bottom, transparent, rgba(212, 165, 116, 0.08), transparent);
    }

    .deco-line--horizontal {
      height: 1px;
      width: 30vw;
      bottom: 20%;
      right: 0;
      background: linear-gradient(to left, rgba(212, 165, 116, 0.06), transparent);
    }

    .deco-circle {
      position: fixed;
      z-index: 2;
      pointer-events: none;
      width: 320px;
      height: 320px;
      top: -80px;
      right: -80px;
      border-radius: 50%;
      border: 1px solid rgba(212, 165, 116, 0.04);
    }

    .deco-circle::after {
      content: '';
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 1px solid rgba(212, 165, 116, 0.03);
    }

    /* background text */

    .bg-text {
      position: fixed;
      z-index: 1;
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(8rem, 18vw, 16rem);
      color: rgba(212, 165, 116, 0.02);
      letter-spacing: -0.03em;
      line-height: 0.8;
      user-select: none;
      pointer-events: none;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-style: italic;
    }

    /* --- main container --- */

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* card */

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow:
        0 0 80px rgba(212, 165, 116, 0.03),
        0 30px 60px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(24px);
      animation: cardEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* brand area */

    .brand {
      text-align: center;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      border-radius: 14px;
      background: #D4747F;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: #0a0a0a;
      box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2);
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .brand-subtitle {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* form */

    .form-group {
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .form-group:nth-child(1) { animation-delay: 0.6s; }
    .form-group:nth-child(2) { animation-delay: 0.7s; }
    .form-group:nth-child(3) { animation-delay: 0.8s; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-input-wrap {
      position: relative;
    }

    .form-input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input::placeholder {
      color: var(--text-muted);
      font-weight: 300;
    }

    .form-input:hover {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .form-input:focus {
      border-color: var(--accent);
      background: rgba(212, 165, 116, 0.04);
      box-shadow: 0 0 0 3px var(--input-focus);
    }

    /* password visibility toggle */

    .input-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 13px;
      font-family: var(--font-ui);
      transition: color 0.2s;
    }

    .input-toggle:hover {
      color: var(--text-secondary);
    }

    /* remember / forgot */

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-wrap input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      background: var(--input-bg);
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }

    .checkbox-wrap input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4.5px;
      top: 1.5px;
      width: 5px;
      height: 9px;
      border: solid #0a0a0a;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    .checkbox-label {
      font-size: 12px;
      color: var(--text-secondary);
      user-select: none;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 400;
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      opacity: 0.8;
    }

    /* submit button */

    .btn-submit {
      width: 100%;
      height: 50px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0a0a0a;
      background: #CFD474;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #E2E89E, #CFD474);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-submit:hover::before {
      opacity: 1;
    }

    .btn-submit:hover {
      box-shadow: 0 4px 30px rgba(207, 212, 116, 0.3);
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(0);
      box-shadow: 0 2px 15px rgba(212, 165, 116, 0.2);
    }

    .btn-submit span {
      position: relative;
      z-index: 1;
    }

    /* divider */

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      opacity: 0;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.95s forwards;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--input-border);
    }

    .divider-text {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* social buttons */

    .social-row {
      display: flex;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
    }

    .btn-social {
      flex: 1;
      height: 44px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-social:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
    }

    .btn-social svg {
      width: 16px;
      height: 16px;
    }

    /* signup */

    .signup-text {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 1.05s forwards;
    }

    .signup-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .signup-link:hover {
      opacity: 0.8;
    }

    /* --- floating orbs --- */

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      filter: blur(80px);
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(212, 165, 116, 0.04);
      top: 10%;
      right: 15%;
      animation: float1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 200px;
      height: 200px;
      background: rgba(180, 140, 100, 0.03);
      bottom: 15%;
      left: 10%;
      animation: float2 15s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, 20px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -30px); }
    }

    /* --- responsive --- */

    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
        border-radius: 16px;
      }

      .brand-title {
        font-size: 24px;
      }

      .bg-text {
        font-size: 6rem;
      }
    }
  </style>
</head>
<body>

  <!-- background layers -->
  <div class="bg-gradient"></div>
  <div class="bg-grain"></div>

  <!-- floating orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- decorative elements -->
  <div class="deco-line deco-line--vertical"></div>
  <div class="deco-line deco-line--horizontal"></div>
  <div class="deco-circle"></div>

  <!-- background text -->
  <div class="bg-text">Sign In</div>

  <!-- login card -->
  <main class="login-container">
    <div class="login-card">

      <!-- brand -->
      <div class="brand">
        <div class="brand-icon">A</div>
        <h1 class="brand-title">Welcome Back</h1>
        <p class="brand-subtitle">请登录你的账号以继续</p>
      </div>

      <!-- form -->
      <form id="loginForm" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="email">邮箱地址</label>
          <div class="form-input-wrap">
            <input
              class="form-input"
              type="email"
              id="email"
              placeholder="name@example.com"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="form-input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="输入你的密码"
              required
            >
            <button type="button" class="input-toggle" id="togglePwd">显示</button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember">
            <span class="checkbox-label">记住我</span>
          </label>
          <a href="#" class="forgot-link">忘记密码?</a>
        </div>

        <button class="btn-submit" type="submit">
          <span>登 录</span>
        </button>
      </form>

      <!-- divider -->
      <div class="divider">
        <span class="divider-text">或</span>
      </div>

      <!-- social login -->
      <div class="social-row">
        <button class="btn-social" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn-social" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          GitHub
        </button>
        <button class="btn-social" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
      </div>

      <!-- signup -->
      <p class="signup-text">
        还没有账号？<a href="#" class="signup-link">立即注册</a>
      </p>

    </div>
  </main>

  <script>
    // password visibility toggle
    const toggleBtn = document.getElementById('togglePwd');
    const pwdInput = document.getElementById('password');

    toggleBtn.addEventListener('click', () => {
      const isPassword = pwdInput.type === 'password';
      pwdInput.type = isPassword ? 'text' : 'password';
      toggleBtn.textContent = isPassword ? '隐藏' : '显示';
    });

    // form submission
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const btn = form.querySelector('.btn-submit');
      const originalText = btn.querySelector('span').textContent;

      btn.querySelector('span').textContent = '登录中...';
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.7';

      setTimeout(() => {
        btn.querySelector('span').textContent = originalText;
        btn.style.pointerEvents = '';
        btn.style.opacity = '';
      }, 1500);
    });
  </script>

</body>
</html>
